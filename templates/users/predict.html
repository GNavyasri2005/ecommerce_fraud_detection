{% extends 'users/Userbase.html' %}

{% block content %}
<style>
    .predict-fraud {
        background: rgba(27, 38, 59, 0.9);
        padding: 2rem;
        margin: 2rem auto;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        max-width: 800px;
    }

    .predict-fraud h3 {
        color: #00d4ff;
        font-size: 1.8rem;
        margin-bottom: 1.5rem;
        text-shadow: 0 0 5px rgba(0, 212, 255, 0.5);
    }

    .predict-fraud form {
        padding: 1.5rem;
        background: rgba(43, 62, 94, 0.8);
        border-radius: 8px;
        border: 1px solid #00d4ff;
    }

    .predict-fraud .form-group {
        margin-bottom: 1.5rem;
    }

 Christmas
    .predict-fraud label {
        color: #b0c4de;
        font-size: 1rem;
        font-weight: 500;
        display: block;
        margin-bottom: 0.5rem;
    }

    .predict-fraud input.form-control {
        width: 100%;
        padding: 0.75rem;
        background: #1b263b;
        border: 1px solid #00d4ff;
        border-radius: 5px;
        color: #e0e0e0;
        font-size: 1rem;
    }

    .predict-fraud input.form-control:focus {
        outline: none;
        border-color: #b0c4de;
        box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
    }

    .predict-fraud .btn {
        padding: 0.75rem 1.5rem;
        background-color: #00d4ff;
        color: #0d1b2a;
        border: none;
        border-radius: 5px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .predict-fraud .btn:hover {
        background-color: #b0c4de;
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        transform: translateY(-2px);
    }

    .predict-fraud .alert {
        background: rgba(0, 212, 255, 0.2);
        color: #e0e0e0;
        padding: 1rem;
        margin-top: 1.5rem;
        border-radius: 5px;
        border: 1px solid #00d4ff;
        text-align: center;
    }

    .predict-fraud .alert h4 {
        color: #00d4ff;
        font-size: 1.4rem;
        margin-bottom: 0.5rem;
    }

    .predict-fraud .alert p {
        font-size: 1.1rem;
        color: #b0c4de;
        margin: 0;
    }

    @media (max-width: 768px) {
        .predict-fraud {
            padding: 1.5rem;
        }

        .predict-fraud h3 {
            font-size: 1.6rem;
        }

        .predict-fraud form {
            padding: 1rem;
        }

        .predict-fraud label {
            font-size: 0.95rem;
        }

        .predict-fraud input.form-control {
            font-size: 0.95rem;
        }

        .predict-fraud .alert h4 {
            font-size: 1.3rem;
        }
    }

    @media (max-width: 480px) {
        .predict-fraud h3 {
            font-size: 1.4rem;
        }

        .predict-fraud .alert h4 {
            font-size: 1.2rem;
        }

        .predict-fraud .alert p {
            font-size: 1rem;
        }
    }
</style>

<div class="predict-fraud">
    <h3>🧪 Predict Transaction Fraud</h3>
    <form method="post" class="predict-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="amount">Transaction Amount</label>
            <input type="number" step="0.01" name="amount" id="amount" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="method">Payment Method</label>
            <input type="text" name="method" id="method" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" name="location" id="location" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="ip">IP Address</label>
            <input type="text" name="ip" id="ip" class="form-control" required>
        </div>
        <button class="btn">🔍 Predict Fraud</button>
    </form>

    {% if prediction %}
    <div class="alert">
        <h4>Fraud Prediction Result</h4>
        <p><strong>{{ prediction }}</strong></p>
    </div>
    {% endif %}
</div>
{% endblock %}
